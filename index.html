<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tribunal Cause List Display</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/jpeg" href="./img/judiciary logo.jpeg">
    <link rel="shortcut icon" type="image/jpeg" href="../A-01/images/judiciary logo.jpeg">
</head>

<body>
    <div id="app">
        <header class="main-header">
            <div class="header-content-wrapper" style="display: flex; align-items: center; gap: 20px;">
                <img src="./img/judiciary logo.jpeg" alt="Judiciary Logo" id="judiciaryLogo"
                    style="height: 80px; object-fit: contain; border-radius: 50%; box-shadow: 0 0 10px rgba(207, 169, 45, 0.5);">
                <div class="header-left">
                    <h1 id="tribunalTitle">Judiciary Cause List</h1>
                    <p id="currentDateDisplay" class="date-subtitle"></p>
                </div>
            </div>
            <div class="header-right"></div>
        </header>

        <div class="table-container">
            <table id="scheduleTable" style="display: none;">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Tribunal</th>
                        <th>Presiding Officer</th>
                        <th>Matter Type</th>
                        <th>Case No.</th>
                        <th>Time</th>
                    </tr>
                </thead>
                <tbody id="scheduleBody"></tbody>
            </table>
            <div id="noDataMessage" class="hidden">
                <div class="empty-state">
                    <img src="./img/page-not-found.png" alt="No matters icon" class="empty-state-icon">
                    <p id="noDataText">Oops! No matters loaded.</p>
                </div>
            </div>
        </div>

        <div id="ticker">
            <div class="ticker-label">HAPPENING TODAY</div>
            <div class="ticker-content-wrapper">
                <span id="tickerText">Loading upcoming cases...</span>
            </div>
        </div>
    </div>

    <div id="adminModal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Admin Panel <span id="adminTimerDisplay" style="font-size: 0.9rem; margin-left: 10px; color: #ef4444;"></span></h2>
                <button id="closeAdminBtn" class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <section class="upload-section">
                    <label for="pdfUpload">Upload PDF(s):</label>
                    <input id="pdfUpload" type="file" accept="application/pdf" multiple>
                    <span id="uploadStatus">Waiting for PDF upload(s)...</span>
                    <button id="clearDataBtn" type="button" class="admin-danger-btn">Clear Published Data</button>
                </section>
            </div>
        </div>
    </div>

    <script src="script.js" type="module"></script>
</body>

</html>
